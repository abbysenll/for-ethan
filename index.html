<!DOCTYPE html>
<html>
<head>
  <title>Single Centered Card</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 400px;   /* large rectangle */
      height: 300px;
      background: white;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="card">
    Title
  </div>

</body>
</html>
