<!DOCTYPE html>
<html>
<head>
  <title>Card With Overlay Arrows</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      width: 800px;   /* double card width to fit overlay cards */
      height: 800px;  /* some extra space for arrows */
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* Arrows */
    .arrow {
      position: absolute;
      top: 0;
      width: 50px;
      height: 50px;
      background: white;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.3s ease;
      z-index: 10; /* arrows on top */
    }

    #leftArrow {
      left: 200px;
      opacity: 0; /* initially hidden */
    }

    #rightArrow {
      right: 200px;
      opacity: 1; /* initially visible */
    }

    /* Cards */
    .card {
      width: 400px;
      height: 700px;
      background: white;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      position: absolute;
      top: 50px; /* space for arrows */
      transition: opacity 0.5s ease;
    }

    /* Original card centered */
    #originalCard {
      left: 200px;
      z-index: 1; /* below overlay cards when hidden */
    }

    /* Overlay cards side by side */
    #leftCard {
      left: 0;
      z-index: 5; /* on top */
      opacity: 0;
    }

    #rightCard {
      left: 400px;
      z-index: 5; /* on top */
      opacity: 0;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    .visible {
      opacity: 1;
      pointer-events: auto;
    }

  </style>
</head>
<body>

  <div class="container">
    <!-- Arrows -->
    <div class="arrow" id="leftArrow">&#8592;</div>
    <div class="arrow" id="rightArrow">&#8594;</div>

    <!-- Cards -->
    <div class="card" id="originalCard">Title</div>
    <div class="card" id="leftCard">Left</div>
    <div class="card" id="rightCard">Right</div>
  </div>

  <script>
    let step = 0;

    const leftArrow = document.getElementById('leftArrow');
    const rightArrow = document.getElementById('rightArrow');
    const originalCard = document.getElementById('originalCard');
    const leftCard = document.getElementById('leftCard');
    const rightCard = document.getElementById('rightCard');

    rightArrow.addEventListener('click', () => {
      if (step === 0) {
        // Step 1: show left arrow
        leftArrow.style.opacity = '1';
        step = 1;
      } else if (step === 1) {
        // Step 2: show overlay cards on top, hide original
        originalCard.classList.add('hidden');
        leftCard.style.opacity = '1';
        rightCard.style.opacity = '1';
        step = 2;
      }
    });

    leftArrow.addEventListener('click', () => {
      // Optional: go back to previous step if desired
      if (step === 1) {
        leftArrow.style.opacity = '0';
        step = 0;
      }
    });
  </script>

</body>
</html>
