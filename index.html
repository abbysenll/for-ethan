<!DOCTYPE html>
<html>
<head>
  <title>Card</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      justify-content: center; /* center everything horizontally */
      align-items: center;
      gap: 20px; /* space between two cards later */
      transition: all 0.4s ease;
    }

    .card {
      width: 300px;
      height: 400px;
      background: white;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .hidden {
      opacity: 0;
      transform: scale(0.8);
      pointer-events: none;
    }

    .arrow-btn {
      width: 50px;
      height: 50px;
      border: 2px solid black;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 25px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }

    .arrow-btn:hover {
      background: #e0e0e0;
    }

  </style>
</head>
<body>

  <div class="container" id="container">

    <!-- TITLE CARD -->
    <div class="card" id="titleCard">
      <h2>Title Here</h2>
    </div>

    <!-- ARROW BUTTON -->
    <div class="arrow-btn" id="arrowBtn" onclick="openCards()">▶</div>

    <!-- LEFT CARD -->
    <div class="card hidden" id="leftCard">
      <p>Left text</p>
    </div>

    <!-- RIGHT CARD -->
    <div class="card hidden" id="rightCard">
      <p>Right text</p>
    </div>

  </div>

  <script>
    function openCards() {
      const title = document.getElementById("titleCard");
      const left = document.getElementById("leftCard");
      const right = document.getElementById("rightCard");
      const arrow = document.getElementById("arrowBtn");

      // Animate title card disappearance
      title.style.transform = "scale(0.8)";
      title.style.opacity = "0";
      arrow.style.opacity = "0";

      setTimeout(() => {
        title.classList.add("hidden");
        arrow.classList.add("hidden");

        // Show left and right cards
        left.classList.remove("hidden");
        right.classList.remove("hidden");
      }, 300);
    }
  </script>

</body>
</html>
